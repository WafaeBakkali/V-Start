<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>VeoStart</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 text-gray-800">
	<header class="bg-gradient-to-r from-gray-800 to-gray-900 text-white shadow-2xl">
		<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
			<h1 class="text-4xl md:text-5xl font-black tracking-tight">VeoStart</h1>
			<p class="mt-2 text-lg text-gray-300">Your Veo prompting assistant</p>
		</div>
	</header>
	<main class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
		<div class="flex flex-col md:flex-row gap-8">
			<nav class="md:w-64">
				<div class="flex flex-row md:flex-col flex-wrap md:flex-nowrap space-x-2 md:space-x-0 md:space-y-2 bg-gray-200 p-1.5 rounded-xl">
					<button id="generator-main-tab" class="main-tab flex-1 md:flex-none w-full py-2.5 px-4 font-bold rounded-lg text-sm">
						<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" /></svg>
						<span class="truncate">Prompt Generator</span>
					</button>
                    </div>
			</nav>
			<div id="main-content" class="flex-1"></div>
		</div>
	</main>
	<div id="notification-toast"></div>
	<script type="module" src="/src/main.js"></script>
</body>
</html>
